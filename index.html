<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>AI Code Builder Pro v2.0</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;font:inherit}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    :root{
      --bg:#0d1117; --bg2:#161b22; --bg3:#21262d; --border:#30363d;
      --accent:#58a6ff; --accent2:#1f6feb; --success:#3fb950; --danger:#f85149; --warning:#d2991d;
      --text:#c9d1d9; --text2:#8b949e;
    }
    body.light-theme{
      --bg:#ffffff; --bg2:#f6f8fa; --bg3:#eaeef2; --border:#d0d7de; --text:#24292f; --text2:#57606a;
    }
    .hidden{display:none!important}
    .flex{display:flex;align-items:center;gap:8px}.flex-between{justify-content:space-between}.flex-wrap{flex-wrap:wrap}.gap-sm{gap:8px}.gap-md{gap:16px}
    .w-full{width:100%}
    .btn{padding:8px 16px;border-radius:6px;font-weight:600;cursor:pointer;border:none;background:var(--bg3);color:var(--text);transition:0.2s}.btn:hover{opacity:0.8}
    .btn-accent{background:var(--accent2);color:#fff}.btn-success{background:var(--success);color:#fff}.btn-danger{background:var(--danger);color:#fff}.btn-warning{background:var(--warning);color:#000}
    .btn-sm{padding:4px 10px;font-size:0.85rem}
    textarea,input,select{width:100%;padding:8px 12px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:monospace;resize:vertical}
    .code-output{background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:12px;min-height:200px;white-space:pre-wrap;font-family:monospace;overflow:auto;max-height:400px}
    iframe{border:1px solid var(--border);border-radius:6px;width:100%;height:300px;background:#fff}
    .chat-box{max-height:350px;overflow-y:auto;border:1px solid var(--border);border-radius:6px;padding:12px;background:var(--bg2);margin-bottom:12px}
    .chat-msg{margin-bottom:8px}.user-msg{text-align:right;color:var(--accent)}.ai-msg{text-align:left}
    .snippet-card{background:var(--bg2);padding:12px;border-radius:6px;border:1px solid var(--border);cursor:pointer}.snippet-card:hover{border-color:var(--accent)}
    .container{max-width:1100px;margin:0 auto;padding:16px}
    header{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border);margin-bottom:20px}
    .tabs{display:flex;gap:8px;margin-bottom:16px}
    .tab{padding:6px 16px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--bg2)}.tab.active{background:var(--accent2);color:#fff;border-color:var(--accent2)}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    @media(max-width:768px){.grid-2{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container" id="app">
  <header>
    <h1 style="font-size:1.5rem">🤖 AI Code Builder Pro v2.0</h1>
    <div class="flex gap-sm">
      <button class="btn btn-sm" onclick="toggleTheme()">🌓 Tema</button>
    </div>
  </header>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('chat')">💬 Komunikasi AI</div>
    <div class="tab" onclick="switchTab('generate')">✨ Generate & Rekayasa Kode</div>
    <div class="tab" onclick="switchTab('snippets')">📚 Pengetahuan & Snippets</div>
  </div>
<div id="tab-chat">
  <div class="chat-box" id="chatMessages"></div>
  <div class="flex">
    <input type="text" id="chatInput" placeholder="Tanyakan apa saja... AI bisa mencari di internet jika perlu." />
    <button class="btn btn-accent" onclick="sendChatMessage()">Kirim</button>
  </div>
</div>
<div id="tab-generate" class="hidden">
  <div class="grid-2">
    <div>
      <label class="text-sm">Deskripsikan kode yang Anda inginkan:</label>
      <textarea id="codePrompt" rows="4" placeholder="Contoh: Buat halaman portofolio responsif dengan navigasi dan animasi..."></textarea>
      <label class="text-sm mt-2">Atau tempel kode yang ingin direkayasa:</label>
      <textarea id="existingCode" rows="6" placeholder="Tempel kode HTML/CSS/JS di sini untuk diperbaiki / disempurnakan..."></textarea>
      <div class="flex gap-sm mt-2">
        <select id="codeType" style="width:auto">
          <option value="full">HTML + CSS + JS</option>
          <option value="html">HTML only</option>
          <option value="css">CSS only</option>
          <option value="js">JavaScript only</option>
        </select>
        <button class="btn btn-accent" onclick="generateCode()">⚡ Generate / Rekayasa</button>
      </div>
    </div>
    <div>
      <div class="flex-between mb-2">
        <strong>Kode Hasil</strong>
        <div class="flex gap-sm">
          <button class="btn btn-sm" onclick="copyCode()">📋 Copy</button>
          <button class="btn btn-sm btn-success" onclick="downloadCode()">⬇ Download</button>
          <button class="btn btn-sm btn-warning" onclick="applyToPreview()">👁 Preview</button>
        </div>
      </div>
      <div class="code-output" id="codeOutput">// Kode akan muncul di sini</div>
    </div>
  </div>
  <div style="margin-top:16px;">
    <strong>Live Preview</strong>
    <iframe id="previewFrame"></iframe>
  </div>
</div>
  <div id="tab-snippets" class="hidden">
    <div class="flex-between mb-3">
      <h3>📚 Koleksi Snippet & Pengetahuan Web</h3>
      <button class="btn btn-sm btn-accent" onclick="addCustomSnippet()">+ Tambah Snippet</button>
    </div>
    <div class="grid-2" id="snippetsList"></div>
  </div>
</div>
<script>
const SYSTEM_PROMPT = `Kamu adalah AI Code Builder Pro, asisten pemrograman web paling lengkap.
Kamu menguasai HTML5, CSS3, JavaScript ES6+, DOM, Web API, accessibility, performa, SEO, dan best practice.
Kamu bisa menulis kode valid, semantik, responsif, dan kompatibel lintas browser.
Jika diminta merekayasa kode, perbaiki / sempurnakan kode yang diberikan sesuai instruksi.
Gunakan komentar pada kode untuk menjelaskan bagian penting.
Jika ditanya tentang konsep, jelaskan secara mendalam dengan contoh.
Jika kamu tidak tahu, katakan "Saya akan mencari informasi terbaru..." lalu gunakan hasil pencarian untuk menjawab.

Pengetahuan inti yang kamu kuasai:
- Semua elemen HTML5 (tag, atribut, semantic, form, multimedia, canvas, SVG).
- CSS3 (selectors, box model, flexbox, grid, animasi, variabel, media queries, container queries).
- JavaScript (variabel, tipe data, fungsi, objek, array, async/await, DOM, event, fetch, JSON, localStorage, service worker, ES module, Web Components).
- Web API (geolocation, notification, camera, audio/video, WebRTC, WebSocket, IndexedDB, Payment Request, Push API).
- Framework (React, Vue, Angular, Svelte, Astro, Next.js – konsep dasar dan sintaks).
- CSS Framework (Bootstrap, Tailwind, Bulma, Foundation).
- Version control (Git), testing (Jest, Cypress), debugging (Chrome DevTools).
- Aksesibilitas (ARIA, WCAG 2.1), SEO semantic, performa (Core Web Vitals, Lighthouse).
- Keamanan web (XSS, CSRF, CORS, CSP, HTTPS, OWASP).
- Progressive Web App (PWA), Service Worker, Web App Manifest.
- Animasi web (CSS animations, Web Animations API, GSAP, Lottie).
- API pihak ketiga populer (Stripe, Mapbox, Firebase, Supabase).

Berikan jawaban yang akurat, lengkap, dan mudah dipahami.`;
</script>
<script>
const DEFAULT_SNIPPETS = [
  { title:"HTML5 Boilerplate", code:`<!DOCTYPE html>\n<html lang="id">\n<head>\n  <meta charset="UTF-8">\n  <meta name="viewport" content="width=device-width, initial-scale=1.0">\n  <title>Document</title>\n</head>\n<body>\n  \n</body>\n</html>` },
  { title:"CSS Flexbox Center", code:`.container {\n  display: flex;\n  justify-content: center;\n  align-items: center;\n  height: 100vh;\n}` },
  { title:"CSS Grid Responsif", code:`.grid {\n  display: grid;\n  grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));\n  gap: 16px;\n}` },
  { title:"Fetch API GET", code:`fetch('https://api.example.com/data')\n  .then(response => response.json())\n  .then(data => console.log(data))\n  .catch(error => console.error('Error:', error));` },
  { title:"Async/Await Fetch", code:`async function getData() {\n  try {\n    const response = await fetch('https://api.example.com/data');\n    const data = await response.json();\n    return data;\n  } catch (error) {\n    console.error('Error:', error);\n  }\n}` },
  { title:"LocalStorage CRUD", code:`// Simpan\nlocalStorage.setItem('key', JSON.stringify(data));\n// Ambil\nconst data = JSON.parse(localStorage.getItem('key'));\n// Hapus\nlocalStorage.removeItem('key');` },
  { title:"Event Listener", code:`element.addEventListener('click', (event) => {\n  console.log('Clicked!', event.target);\n});` },
  { title:"Debounce Function", code:`function debounce(func, delay) {\n  let timeout;\n  return (...args) => {\n    clearTimeout(timeout);\n    timeout = setTimeout(() => func.apply(this, args), delay);\n  };\n}` }
];
let snippets = JSON.parse(localStorage.getItem('ai_snippets')) || [...DEFAULT_SNIPPETS];
</script>
<script>
async function searchInternet(query){
  try{
    const res = await fetch('https://api.duckduckgo.com/?q=' + encodeURIComponent(query) + '&format=json&no_html=1');
    const data = await res.json();
    let hasil = '';
    if(data.AbstractText) hasil += data.AbstractText + '\n';
    if(data.RelatedTopics && data.RelatedTopics.length > 0){
      data.RelatedTopics.slice(0,5).forEach(topic => {
        if(topic.Text) hasil += '- ' + topic.Text + '\n';
      });
    }
    return hasil || 'Tidak ada informasi ditemukan.';
  }catch(e){
    return 'Gagal mencari di internet.';
  }
}
</script>
<script>
async function callAI(userMessage, systemPrompt = SYSTEM_PROMPT, useInternet = true){
  let fullPrompt = systemPrompt + "\n\nUser: " + userMessage + "\nAI:";
  try{
    const res = await fetch('https://api.akuari.my.id/ai/gpt4?prompt=' + encodeURIComponent(fullPrompt));
    const data = await res.json();
    let reply = data.result || data.respon || '';
    if(!reply && useInternet){
      const internetResult = await searchInternet(userMessage);
      reply = "Saya mencari di internet:\n" + internetResult;
    }
    return reply || "Maaf, saya kesulitan memproses permintaan ini.";
  }catch(e){
    if(useInternet){
      const internetResult = await searchInternet(userMessage);
      return "Saya tidak bisa menghubungi AI utama, tetapi saya mencari di internet:\n" + internetResult;
    }
    return "Gagal menghubungi AI. Periksa koneksi internet Anda.";
  }
}
</script>
<script>
function switchTab(tab){
  document.getElementById('tab-chat').classList.add('hidden');
  document.getElementById('tab-generate').classList.add('hidden');
  document.getElementById('tab-snippets').classList.add('hidden');
  document.getElementById('tab-' + tab).classList.remove('hidden');
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
}
function toggleTheme(){
  document.body.classList.toggle('light-theme');
  localStorage.setItem('ai_theme', document.body.classList.contains('light-theme') ? 'light' : 'dark');
}
(function(){
  if(localStorage.getItem('ai_theme') === 'light') document.body.classList.add('light-theme');
  renderSnippets();
})();
</script>
<script>
function addChatMessage(role, text){
  const div = document.createElement('div');
  div.className = 'chat-msg ' + (role==='user'?'user-msg':'ai-msg');
  div.innerHTML = role==='user'? '<strong>Anda:</strong> ' + text : '<strong>AI:</strong> ' + text;
  document.getElementById('chatMessages').appendChild(div);
  div.scrollIntoView(false);
}

async function sendChatMessage(){
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg) return;
  addChatMessage('user', msg);
  input.value = '';
  addChatMessage('ai', '⏳ Mencari...');
  const reply = await callAI(msg);
  document.querySelector('#chatMessages .ai-msg:last-child').innerHTML = '<strong>AI:</strong> ' + reply;
  document.querySelector('#chatMessages .ai-msg:last-child').scrollIntoView(false);
}
</script>
<script>
async function generateCode(){
  const prompt = document.getElementById('codePrompt').value.trim();
  const existingCode = document.getElementById('existingCode').value.trim();
  const type = document.getElementById('codeType').value;
  if(!prompt && !existingCode) return alert('Masukkan deskripsi atau kode yang ingin direkayasa!');
  
  let finalPrompt = '';
  if(existingCode){
    finalPrompt = 'Rekayasa / perbaiki kode berikut:\n```\n' + existingCode + '\n```\nInstruksi: ' + (prompt || 'Sempurnakan kode ini.');
  } else {
    if(type==='full') finalPrompt = 'Buatkan kode HTML lengkap dengan CSS dan JS inline. ' + prompt;
    else if(type==='html') finalPrompt = 'Buatkan kode HTML saja. ' + prompt;
    else if(type==='css') finalPrompt = 'Buatkan kode CSS. ' + prompt;
    else if(type==='js') finalPrompt = 'Buatkan kode JavaScript. ' + prompt;
  }
  
  document.getElementById('codeOutput').textContent = 'Menghasilkan kode...';
  const response = await callAI(finalPrompt);
  document.getElementById('codeOutput').textContent = response;
  updatePreview(response);
}

function updatePreview(code){
  const iframe = document.getElementById('previewFrame');
  iframe.srcdoc = code;
}
function applyToPreview(){
  const code = document.getElementById('codeOutput').textContent;
  updatePreview(code);
}
function copyCode(){
  const code = document.getElementById('codeOutput').textContent;
  navigator.clipboard.writeText(code).then(() => alert('Kode disalin!'));
}
function downloadCode(){
  const code = document.getElementById('codeOutput').textContent;
  const blob = new Blob([code], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'index.html';
  a.click();
}
</script>
<script>
function renderSnippets(){
  const list = document.getElementById('snippetsList');
  list.innerHTML = snippets.map((s, i) => `
    <div class="snippet-card" onclick="loadSnippet(${i})">
      <strong>${s.title}</strong>
      <pre style="font-size:0.75rem;overflow:auto;max-height:100px;margin-top:4px;">${escapeHTML(s.code.substring(0,150))}...</pre>
    </div>
  `).join('');
}

function escapeHTML(str){
  return str.replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[m]);
}

function loadSnippet(index){
  const snippet = snippets[index];
  document.getElementById('existingCode').value = snippet.code;
  document.getElementById('codePrompt').value = 'Sempurnakan kode ini: ' + snippet.title;
  switchTab('generate');
}

function addCustomSnippet(){
  const title = prompt('Judul snippet:');
  if(!title) return;
  const code = prompt('Kode:');
  if(!code) return;
  snippets.push({title, code});
  localStorage.setItem('ai_snippets', JSON.stringify(snippets));
  renderSnippets();
}
</script>
</body>
</html>
